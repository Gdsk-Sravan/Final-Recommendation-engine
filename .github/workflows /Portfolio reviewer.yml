
name: Stock Reviewer

on:
  workflow_dispatch:
    inputs:
      force_price_refresh:
        description: "Force re-download latest prices (use after 4:30 PM IST for fresh EOD data)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      universe_mode:
        description: "Universe to scan"
        required: false
        default: "NSE_ALL"
        type: choice
        options:
          - "NSE_ALL"
          - "NIFTY_500"
          - "CUSTOM_LIST"

      force_universe_refresh:
        description: "Force NSE stock list refresh"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      force_full_cache_refresh:
        description: "Force full OHLCV cache rebuild"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_ai_second_pass:
        description: "Use AI second pass if key is available"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      persist_state_to_repo:
        description: "Commit portfolio state back to repo. Keep false for public repos."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      upload_private_reports:
        description: "Upload generated reports as artifact. Keep false for public repos."
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    # 13:30 UTC = 7:00 PM IST, Monday to Friday
    - cron: "30 13 * * 1-5"

permissions:
  contents: write
  actions: read

concurrency:
  group: stock-reviewer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scanner:
    name: Run Stock Reviewer
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PYTHONUNBUFFERED: "1"
      TZ: "Asia/Kolkata"

      # =========================
      # Core runtime config
      # =========================
      UNIVERSE_MODE: ${{ github.event.inputs.universe_mode || vars.UNIVERSE_MODE || 'NSE_ALL' }}
      ENABLE_AI_SECOND_PASS: ${{ github.event.inputs.enable_ai_second_pass || vars.ENABLE_AI_SECOND_PASS || 'true' }}
      PERSIST_STATE_TO_REPO: ${{ github.event.inputs.persist_state_to_repo || vars.PERSIST_STATE_TO_REPO || 'false' }}
      UPLOAD_PRIVATE_REPORTS: ${{ github.event.inputs.upload_private_reports || vars.UPLOAD_PRIVATE_REPORTS || 'false' }}
      SHOW_VERBOSE_LOGS: ${{ vars.SHOW_VERBOSE_LOGS || 'false' }}

      # =========================
      # Manual portfolio mode
      # =========================
      # BUY recommendations are not auto-added.
      # HOLD / EXIT uses only manually supplied portfolio holdings.
      #
      # This supports both:
      # 1. Secret:   MANUAL_PORTFOLIO_JSON
      # 2. Variable: MANUAL_PORTFOLIO_JSON
      #
      # Secret wins if both exist.
      PORTFOLIO_SOURCE: ${{ vars.PORTFOLIO_SOURCE || 'MANUAL_ENV' }}
      AUTO_TRACK_RECOMMENDED_BUYS: ${{ vars.AUTO_TRACK_RECOMMENDED_BUYS || 'false' }}
      AUTO_CLOSE_EXIT_SIGNALS: ${{ vars.AUTO_CLOSE_EXIT_SIGNALS || 'false' }}
      MANUAL_PORTFOLIO_JSON: ${{ secrets.MANUAL_PORTFOLIO_JSON || vars.MANUAL_PORTFOLIO_JSON || '[]' }}

      # =========================
      # Cache controls
      # =========================
      FORCE_UNIVERSE_REFRESH: ${{ github.event.inputs.force_universe_refresh || 'false' }}
      FORCE_FULL_CACHE_REFRESH: ${{ github.event.inputs.force_full_cache_refresh || 'false' }}
      FORCE_PRICE_REFRESH: ${{ github.event.inputs.force_price_refresh || vars.FORCE_PRICE_REFRESH || 'false' }}

      FULL_CACHE_REFRESH_WEEKDAY: ${{ vars.FULL_CACHE_REFRESH_WEEKDAY || '0' }}
      UNIVERSE_REFRESH_DAYS: ${{ vars.UNIVERSE_REFRESH_DAYS || '7' }}
      FULL_CACHE_REFRESH_DAYS: ${{ vars.FULL_CACHE_REFRESH_DAYS || '7' }}

      PRICE_CACHE_MAX_AGE_HOURS: ${{ vars.PRICE_CACHE_MAX_AGE_HOURS || '18' }}
      INDEX_CACHE_MAX_AGE_HOURS: ${{ vars.INDEX_CACHE_MAX_AGE_HOURS || '4' }}
      ACTIVE_HOLDING_CACHE_MAX_AGE_HOURS: ${{ vars.ACTIVE_HOLDING_CACHE_MAX_AGE_HOURS || '8' }}
      CANDIDATE_CACHE_MAX_AGE_HOURS: ${{ vars.CANDIDATE_CACHE_MAX_AGE_HOURS || '18' }}

      CACHE_DAILY_TRADABLE_LIMIT: ${{ vars.CACHE_DAILY_TRADABLE_LIMIT || '1500' }}
      CACHE_HIGH_QUALITY_LIMIT: ${{ vars.CACHE_HIGH_QUALITY_LIMIT || '250' }}

      # Smart OHLCV daily-candle skip rules.
      CACHE_SMART_SKIP_ENABLED: ${{ vars.CACHE_SMART_SKIP_ENABLED || 'true' }}
      CACHE_REQUIRE_CURRENT_DAILY_CANDLE: ${{ vars.CACHE_REQUIRE_CURRENT_DAILY_CANDLE || 'true' }}
      MARKET_DATA_READY_TIME_IST: ${{ vars.MARKET_DATA_READY_TIME_IST || '18:15' }}
      NO_NEW_CANDLE_RETRY_HOURS: ${{ vars.NO_NEW_CANDLE_RETRY_HOURS || '6' }}
      CACHE_SHOW_TOP_SKIPS: ${{ vars.CACHE_SHOW_TOP_SKIPS || '12' }}

      # =========================
      # News / AI cost controls
      # =========================
      NEWS_FETCH_TOP_N: ${{ vars.NEWS_FETCH_TOP_N || '40' }}
      AI_NEWS_SYMBOL_LIMIT: ${{ vars.AI_NEWS_SYMBOL_LIMIT || '15' }}
      NEWS_FETCH_MAX_WORKERS: ${{ vars.NEWS_FETCH_MAX_WORKERS || '10' }}
      NEWS_FETCH_TIMEOUT_SECONDS: ${{ vars.NEWS_FETCH_TIMEOUT_SECONDS || '8' }}
      NEWS_CACHE_TTL_HOURS: ${{ vars.NEWS_CACHE_TTL_HOURS || '12' }}
      NEWS_MAX_HEADLINES_PER_SYMBOL: ${{ vars.NEWS_MAX_HEADLINES_PER_SYMBOL || '8' }}

      # =========================
      # Capital / risk config
      # =========================
      TOTAL_CAPITAL: ${{ vars.TOTAL_CAPITAL || '200000' }}
      RISK_PER_TRADE_PCT: ${{ vars.RISK_PER_TRADE_PCT || '1.0' }}
      MAX_PORTFOLIO_HEAT: ${{ vars.MAX_PORTFOLIO_HEAT || '6.0' }}
      MAX_ACTIVE_POSITIONS: ${{ vars.MAX_ACTIVE_POSITIONS || '8' }}
      MAX_POSITION_PCT: ${{ vars.MAX_POSITION_PCT || '20' }}
      MAX_SECTOR_EXPOSURE: ${{ vars.MAX_SECTOR_EXPOSURE || '30.0' }}
      MAX_SECTOR_EXPOSURE_PCT: ${{ vars.MAX_SECTOR_EXPOSURE_PCT || '30.0' }}
      MAX_SAME_SECTOR_POSITIONS: ${{ vars.MAX_SAME_SECTOR_POSITIONS || '2' }}
      MAX_SAME_SECTOR_NEW_BUYS_PER_DAY: ${{ vars.MAX_SAME_SECTOR_NEW_BUYS_PER_DAY || '2' }}

      MIN_AVG_TRADED_VALUE: ${{ vars.MIN_AVG_TRADED_VALUE || '5000000' }}
      MIN_AVG_VOLUME: ${{ vars.MIN_AVG_VOLUME || '100000' }}
      MIN_REWARD_RISK: ${{ vars.MIN_REWARD_RISK || '1.8' }}
      MAX_CORRELATION_WITH_HOLDINGS: ${{ vars.MAX_CORRELATION_WITH_HOLDINGS || '0.78' }}
      CORRELATION_LIMIT: ${{ vars.CORRELATION_LIMIT || '0.78' }}

      TIME_EXIT_DAYS: ${{ vars.TIME_EXIT_DAYS || '10' }}
      TRAILING_STOP_ATR_MULTIPLIER: ${{ vars.TRAILING_STOP_ATR_MULTIPLIER || '2.0' }}
      INITIAL_STOP_ATR_MULTIPLIER: ${{ vars.INITIAL_STOP_ATR_MULTIPLIER || '1.5' }}
      TARGET1_R_MULTIPLE: ${{ vars.TARGET1_R_MULTIPLE || '1.5' }}
      TARGET2_R_MULTIPLE: ${{ vars.TARGET2_R_MULTIPLE || '2.8' }}

      # =========================
      # News risk thresholds
      # =========================
      NEWS_SEVERITY_EXIT_THRESHOLD: ${{ vars.NEWS_SEVERITY_EXIT_THRESHOLD || '84' }}
      NEWS_SEVERITY_WATCHLIST_THRESHOLD: ${{ vars.NEWS_SEVERITY_WATCHLIST_THRESHOLD || '60' }}
      MAX_NEWS_SEVERITY_TO_BUY: ${{ vars.MAX_NEWS_SEVERITY_TO_BUY || '74' }}
      MAX_AI_SEVERITY_TO_HOLD: ${{ vars.MAX_AI_SEVERITY_TO_HOLD || '84' }}

      # =========================
      # AI second pass
      # =========================
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'groq' }}
      AI_ENABLED: ${{ vars.AI_ENABLED || 'true' }}
      AI_TIMEOUT_SECONDS: ${{ vars.AI_TIMEOUT_SECONDS || '30' }}
      AI_MAX_RETRIES: ${{ vars.AI_MAX_RETRIES || '2' }}
      AI_TOP_CANDIDATE_LIMIT: ${{ vars.AI_TOP_CANDIDATE_LIMIT || '20' }}
      AI_CONFIDENCE_ADJUSTMENT_LIMIT: ${{ vars.AI_CONFIDENCE_ADJUSTMENT_LIMIT || '5' }}
      LOG_AI_IO: ${{ vars.LOG_AI_IO || 'true' }}

      # GroqCloud (primary AI provider)
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.1-8b-instant' }}
      GROQ_COMMENTARY_MODEL: ${{ vars.GROQ_COMMENTARY_MODEL || 'llama-3.1-8b-instant' }}

      # Gemini (fallback AI provider — set AI_PROVIDER=gemini to activate)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}

      # xAI Grok (legacy compat — not needed when using GroqCloud)
      GROK_API_KEY_ENV_NAME: ${{ vars.GROK_API_KEY_ENV_NAME || 'GROQ_API_KEY' }}
      GROK_API_URL: ${{ vars.GROK_API_URL || 'https://api.groq.com/openai/v1/chat/completions' }}
      GROK_MODEL: ${{ vars.GROK_MODEL || vars.GROQ_MODEL || 'llama-3.1-8b-instant' }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      # =========================
      # Telegram
      # =========================
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore stock reviewer cache
        uses: actions/cache/restore@v4
        with:
          path: |
            cache
            news_cache
            nse_all_symbols.csv
            universe_cache_meta.json
            weekly_job_meta.json
            tradable_universe.csv
            qualified_stocks.csv
            low_volatility_stocks.txt
            cache_refresh_report.csv
            cache_refresh_summary.txt
            news_fetch_universe.txt
            ai_news_universe.txt
            pre_news_candidates.csv
            news_fetch_report.csv
            news_fetch_summary.txt
          key: stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-
            stock-reviewer-data-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests pandas numpy yfinance beautifulsoup4 lxml python-dotenv
          fi

      - name: Preflight check
        run: |
          echo "Python version:"
          python --version

          echo "Universe mode: ${UNIVERSE_MODE}"
          echo "Portfolio source: ${PORTFOLIO_SOURCE}"
          echo "Auto-track recommended buys: ${AUTO_TRACK_RECOMMENDED_BUYS}"
          echo "AI second pass: ${ENABLE_AI_SECOND_PASS}"
          echo "Force universe refresh: ${FORCE_UNIVERSE_REFRESH}"
          echo "Force full cache refresh: ${FORCE_FULL_CACHE_REFRESH}"
          echo "Smart cache skip: ${CACHE_SMART_SKIP_ENABLED}"
          echo "Expected data-ready time IST: ${MARKET_DATA_READY_TIME_IST}"
          echo "Upload private reports: ${UPLOAD_PRIVATE_REPORTS}"
          echo "Persist state to repo: ${PERSIST_STATE_TO_REPO}"
          echo "Total capital: ${TOTAL_CAPITAL}"
          echo "Risk per trade pct: ${RISK_PER_TRADE_PCT}"

          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "WARNING: TELEGRAM_BOT_TOKEN is missing. Telegram may not send."
          fi

          if [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "WARNING: TELEGRAM_CHAT_ID is missing. Telegram may not send."
          fi

          if [ "${ENABLE_AI_SECOND_PASS}" = "true" ] && [ -z "${GROQ_API_KEY}" ] && [ -z "${GROK_API_KEY}" ]; then
            echo "WARNING: AI enabled, but GROQ_API_KEY/GROK_API_KEY is missing. Deterministic fallback should be used."
          fi

      - name: Run daily stock reviewer pipeline
        run: |
          python daily_pipeline.py

      - name: Run validation checks
        if: success()
        run: |
          if [ -f validation_checks.py ]; then
            python validation_checks.py
          else
            echo "validation_checks.py not found. Skipping validation."
          fi

      - name: Show safe run summary
        if: always()
        run: |
          echo "===== SAFE SUMMARY ====="

          echo "Workflow completed at:"
          date

          echo ""
          echo "Generated files:"
          ls -1 *.txt *.csv *.json 2>/dev/null || true

          echo ""
          echo "Cache summary:"
          if [ -f cache_refresh_summary.txt ]; then
            grep -E "Date:|Expected daily candle:|Full weekly refresh:|Planned symbols:|Downloaded:|Skipped|Failed:" cache_refresh_summary.txt || true
          else
            echo "cache_refresh_summary.txt not found."
          fi

          echo ""
          echo "Run status:"
          if [ -f error_log.txt ]; then
            head -n 30 error_log.txt || true
          else
            echo "error_log.txt not found."
          fi

          if [ "${SHOW_VERBOSE_LOGS}" = "true" ]; then
            echo ""
            echo "===== VERBOSE RUN SUMMARY ====="
            if [ -f run_summary.txt ]; then
              cat run_summary.txt
            fi

            echo ""
            echo "===== VERBOSE ERROR LOG ====="
            if [ -f error_log.txt ]; then
              cat error_log.txt
            fi
          fi

      - name: Save updated stock reviewer cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            cache
            news_cache
            nse_all_symbols.csv
            universe_cache_meta.json
            weekly_job_meta.json
            tradable_universe.csv
            qualified_stocks.csv
            low_volatility_stocks.txt
            cache_refresh_report.csv
            cache_refresh_summary.txt
            news_fetch_universe.txt
            ai_news_universe.txt
            pre_news_candidates.csv
            news_fetch_report.csv
            news_fetch_summary.txt
          key: stock-reviewer-data-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload private generated reports
        if: ${{ always() && env.UPLOAD_PRIVATE_REPORTS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: stock-reviewer-private-output
          retention-days: 14
          if-no-files-found: ignore
          path: |
            *.csv
            *.txt
            *.json
            cache/cache_manifest.json

      - name: Persist portfolio state back to repo
        if: ${{ always() && env.PERSIST_STATE_TO_REPO == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          files_to_commit=(
            "portfolio_state.csv"
            "portfolio_status.csv"
            "portfolio_exposure_summary.csv"
            "trade_journal.csv"
            "active_trades.csv"
            "portfolio.txt"
            "portfolio_source_report.txt"
          )

          existing_files=()

          for file in "${files_to_commit[@]}"; do
            if [ -e "$file" ]; then
              existing_files+=("$file")
            fi
          done

          if [ ${#existing_files[@]} -eq 0 ]; then
            echo "No portfolio state files found to persist."
            exit 0
          fi

          git add "${existing_files[@]}"

          if git diff --cached --quiet; then
            echo "No portfolio state changes to commit."
          else
            git commit -m "Update stock reviewer portfolio state"
            git push
          fi
